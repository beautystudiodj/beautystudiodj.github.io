<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador - D&J Beauty Studio</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="icon" href="https://i.imgur.com/vscZKK3.png" type="image/png">
</head>
<body>

    <div class="promo-bar">Panel Administrador</div>

    <header>
        <div class="logo-container">
            <img src="https://i.imgur.com/vscZKK3.png" alt="Logo D&J Beauty Studio">
            <div class="brand-copy">
                <h3>Panel Administrador</h3>
            </div>
        </div>
    </header>

    <nav>
        <a href="../index.html">Inicio</a>
        <a href="../productos.html">Productos</a>
        <a href="../ofertas.html">Ofertas</a>
        <a href="../staff.html">Staff</a>
        <a href="index.html" class="active">Panel</a>
    </nav>

    <div class="container">
        <div class="admin-card">
            <h1>Panel de Administración</h1>
            <p class="section-copy">Selecciona una sección para configurar el sitio.</p>

            <div class="admin-action-grid">
                <a id="admin-products-btn" class="admin-action-btn ghost" href="products.html">Productos</a>
                <a id="admin-offers-btn" class="admin-action-btn ghost" href="#">Ofertas</a>
                <a id="admin-invoices-btn" class="admin-action-btn ghost" href="#">Facturas</a>
                <a id="admin-envios-btn" class="admin-action-btn ghost" href="#">Envíos</a>
                <a id="admin-staff-btn" class="admin-action-btn ghost" href="staff.html">Staff</a>
            </div>

            <div id="admin-panel-area" style="margin-top:18px"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 D&J Beauty Studio.</p>
    </footer>

    <script>
        // Control de acceso demo (NO SEGURO): contraseña hardcodeada 'admin123'
        (function(){
            if (!sessionStorage.getItem('admin_authed')){
                var pass = prompt('Contraseña de administrador (demo):');
                if (pass !== 'admin123'){
                    alert('Acceso denegado. Serás redirigido al inicio.');
                    window.location.href = '../index.html';
                } else {
                    sessionStorage.setItem('admin_authed','1');
                }
            }
        })();
    </script>
    <script src="../firebase-config.js"></script>
    <script src="../script.js"></script>
</body>
</html>
