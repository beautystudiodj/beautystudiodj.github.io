<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Productos - Panel Admin</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="icon" href="https://i.imgur.com/vscZKK3.png" type="image/png">
</head>
<body>

    <div class="promo-bar">Panel Administrador — Productos</div>

    <header>
        <div class="logo-container">
            <img src="https://i.imgur.com/vscZKK3.png" alt="Logo D&J Beauty Studio">
            <div class="brand-copy">
                <h3>Panel Administrador</h3>
                <p>Gestionar Productos (demo)</p>
            </div>
        </div>
    </header>

    <nav>
        <a href="index.html">Panel</a>
        <a href="../productos.html">Sitio Productos</a>
        <a href="../ofertas.html">Ofertas</a>
        <a href="../envios.html">Envíos</a>
        <a href="../staff.html">Staff</a>
    </nav>

    <div class="container">
        <div class="admin-toolbar">
            <div class="breadcrumb">Panel / Productos</div>
            <div class="admin-actions">
                <a class="btn" href="add.html">Agregar producto</a>
                <a class="btn-outline" href="index.html">Volver al Panel</a>
            </div>
        </div>

        <div class="admin-card">
            <h2>Lista de Productos</h2>
            <p class="section-copy">Reducir stock o eliminar productos directamente desde el panel.</p>

            <div id="products-list" style="display:flex;flex-direction:column;gap:10px;margin-top:12px"></div>
            <div class="admin-card-footer">
                <button id="commit-stock-btn" class="btn" disabled>Actualizar stock</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 D&J Beauty Studio. Panel demo.</p>
    </footer>

    <script src="../firebase-config.js"></script>
    <script src="../script.js"></script>
    <script>
        // API helpers (use meta[name="api-base"] or window.__API_BASE__ to point to a remote API)
        function getApiBase(){
            try{ const m = document.querySelector('meta[name="api-base"]'); const g = window.__API_BASE__ || window.__apiBase__ || ''; const b = (m && m.content) ? m.content : g; return (b||'').toString().replace(/\/$/, ''); }catch(e){ return ''; }
        }
        async function apiFetch(endpoint, opts){ const base = getApiBase(); const url = (base ? base.replace(/\/$/, '') + '/api' : '/api') + endpoint; return fetch(url, opts); }

        function loadProducts(){
            // Return products loaded from repository or API (serverProducts)
            return serverProducts || [];
        }
        function saveProducts(arr){ try{ /* intentionally no-op for repo-backed reads */ }catch(e){}
        }
        function formatCOP(num){ return 'COP $' + (num||0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.'); }
        function showToast(msg, timeout=1200){ let t=document.getElementById('admin-toast'); if(!t){ t=document.createElement('div'); t.id='admin-toast'; t.className='toast'; document.body.appendChild(t);} t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), timeout); }

        // pending changes map: id -> newStock
        let pendingStockChanges = {};
        let originalStocks = {};
        // server mode
        let useApi = false;
        let serverProducts = null;
        // editing state
        let editingProductId = null;
        let editingDrafts = {};

        function hasPendingChanges(){ return Object.keys(pendingStockChanges).length > 0; }
        function updateCommitButtonState(){ const btn = document.getElementById('commit-stock-btn'); if(btn) btn.disabled = !hasPendingChanges(); }

        function renderProducts(){
            originalStocks = {};
            const list = document.getElementById('products-list');
            const prods = (serverProducts !== null ? serverProducts : loadProducts()) || [];
            list.innerHTML = '';
            if (!prods.length){
                list.innerHTML = '<p style="color:#666">No hay productos. Usa el botón "Agregar producto" para crear uno.</p>';
                return;
            }

            prods.forEach(p => {
                originalStocks[p.id] = p.stock;
                const current = (pendingStockChanges[p.id] !== undefined) ? pendingStockChanges[p.id] : p.stock;
                const row = document.createElement('div'); row.className='product-row';
                const isEditing = (editingProductId === p.id);
                if (!isEditing) {
                    row.innerHTML = `
                        <img class="product-thumb" src="${p.image || 'https://placehold.co/160x120/eee/777?text=Sin+imagen'}" alt="${p.title}">
                        <div style="min-width:220px">
                            <strong>${p.title}</strong>
                            <div style="color:var(--muted);font-size:0.95rem">${p.eyebrow || ''} — ${formatCOP(p.price)}</div>
                        </div>
                        <div class="product-qty" style="display:flex;align-items:center;gap:8px;">
                            <button class="btn small" data-id="${p.id}" data-action="dec">−</button>
                            <div class="stock-display" id="stock-${p.id}" style="min-width:56px;text-align:center;font-weight:700;">${current}</div>
                            <button class="btn small" data-id="${p.id}" data-action="inc">+</button>
                        </div>
                        <div class="product-actions">
                            <button class="btn small" data-id="${p.id}" data-action="edit">Editar</button>
                            <button class="btn small" data-id="${p.id}" data-action="del">Eliminar</button>
                        </div>`;
                } else {
                    // inline edit form
                    const safeVal = v => (v===undefined || v===null) ? '' : String(v).replace(/"/g, '&quot;');
                    row.innerHTML = `
                        <div style="flex-direction:column;display:flex;gap:8px;width:100%">
                            <div style="display:flex;gap:12px;align-items:center">
                                <img class="product-thumb" src="${p.image || 'https://placehold.co/160x120/eee/777?text=Sin+imagen'}" alt="${p.title}">
                                <div style="flex:1">
                                    <label style="display:block">Título<br><input id="edit-title-${p.id}" value="${safeVal(p.title)}" style="width:100%"></label>
                                    <label style="display:block">Categoría<br><select id="edit-eyebrow-${p.id}" style="width:100%"></select></label>
                                </div>
                                <div style="width:160px">
                                    <label>Precio<br><input id="edit-price-${p.id}" value="${safeVal(p.price)}" style="width:100%"></label>
                                    <label>Stock<br><input id="edit-stock-${p.id}" value="${safeVal(p.stock)}" style="width:100%"></label>
                                </div>
                            </div>
                            <label>Imagen (URL)<br><input id="edit-image-${p.id}" value="${safeVal(p.image)}" style="width:100%"></label>
                            <label>Descripción<br><textarea id="edit-description-${p.id}" rows="2" style="width:100%">${safeVal(p.description)}</textarea></label>
                            <div style="display:flex;gap:8px;justify-content:flex-end">
                                <button class="btn small" data-id="${p.id}" data-action="save-edit">Guardar</button>
                                <button class="btn-outline small" data-id="${p.id}" data-action="cancel-edit">Cancelar</button>
                            </div>
                        </div>`;
                }

                if (pendingStockChanges[p.id] !== undefined && pendingStockChanges[p.id] !== p.stock){
                    row.classList.add('dirty');
                }

                list.appendChild(row);
            });

            // attach handlers (dec/inc/del/edit/save-edit/cancel-edit)
            list.querySelectorAll('button[data-action]').forEach(btn => btn.addEventListener('click', (e)=>{
                const id = btn.dataset.id; const act = btn.dataset.action;
                if (act === 'dec') return reduceStock(id);
                if (act === 'inc') return increaseStock(id);
                if (act === 'del') return deleteProduct(id);
                if (act === 'edit') return openEdit(id);
                if (act === 'cancel-edit') return cancelEdit(id);
                if (act === 'save-edit') return saveEditedProduct(id);
            }));

            updateCommitButtonState();
        }

        function reduceStock(id){
            const base = (originalStocks[id] !== undefined) ? originalStocks[id] : (function(){ const prods = loadProducts(); const p = prods.find(x=>x.id===id); return p ? p.stock||0 : 0; })();
            const current = (pendingStockChanges[id] !== undefined) ? pendingStockChanges[id] : base;
            const newStock = Math.max(0, current - 1);
            if (newStock === current) return;
            pendingStockChanges[id] = newStock;
            const el = document.getElementById('stock-'+id); if (el) el.innerText = newStock;
            const row = el ? el.closest('.product-row') : null; if (row) row.classList.add('dirty');
            updateCommitButtonState();
            showToast('Cambio pendiente', 900);
        }

        function increaseStock(id){
            const base = (originalStocks[id] !== undefined) ? originalStocks[id] : (function(){ const prods = loadProducts(); const p = prods.find(x=>x.id===id); return p ? p.stock||0 : 0; })();
            const current = (pendingStockChanges[id] !== undefined) ? pendingStockChanges[id] : base;
            const newStock = current + 1;
            pendingStockChanges[id] = newStock;
            const el = document.getElementById('stock-'+id); if (el) el.innerText = newStock;
            const row = el ? el.closest('.product-row') : null; if (row) row.classList.add('dirty');
            updateCommitButtonState();
            showToast('Cambio pendiente', 900);
        }

        async function commitStockChanges(){
            if (!hasPendingChanges()) return showToast('No hay cambios pendientes');
            const updates = Object.keys(pendingStockChanges).map(id=> ({ id, stock: pendingStockChanges[id] }));

            // Prefer Firestore when available
            try{
                if (window.bulkUpdateFirestore){
                    const ok = await window.bulkUpdateFirestore(updates);
                    if (ok){ pendingStockChanges = {}; showToast('Stock actualizado (Firestore)', 1400); renderProducts(); return; }
                }
            }catch(e){ /* continue to next */ }

            // If API available, push changes to server
            if (useApi){
                try{
                    const res = await apiFetch('/products/bulk-stock', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ updates }) });
                    if (res && res.ok){
                        // refresh serverProducts from API
                        const fresh = await apiFetch('/products');
                        serverProducts = (fresh && fresh.ok) ? await fresh.json() : serverProducts;
                        pendingStockChanges = {};
                        showToast('Stock actualizado (DB)', 1400);
                        renderProducts();
                        return;
                    }
                }catch(e){ /* continue to fallback */ }
            }

            // Fallback: update local copy (not persisted to repo)
            const prods = loadProducts();
            Object.keys(pendingStockChanges).forEach(id=>{
                const idx = prods.findIndex(p=>p.id===id);
                if (idx === -1) return;
                prods[idx].stock = pendingStockChanges[id];
            });
            saveProducts(prods);
            pendingStockChanges = {};
            showToast('Stock actualizado', 1400);
            renderProducts();
        }

        async function deleteProduct(id){
            if (!confirm('Eliminar este producto?')) return;

            // Prefer Firestore
            try{
                if (window.deleteProductFirestore){
                    const ok = await window.deleteProductFirestore(id);
                    if (ok){ if (pendingStockChanges[id] !== undefined) delete pendingStockChanges[id]; showToast('Producto eliminado (Firestore)'); renderProducts(); return; }
                }
            }catch(e){ /* continue */ }

            // try server delete first
            if (useApi){
                try{
                    const res = await apiFetch('/products/' + encodeURIComponent(id), { method: 'DELETE' });
                    if (res && res.ok){
                        serverProducts = (serverProducts || []).filter(p => p.id !== id);
                        if (pendingStockChanges[id] !== undefined) delete pendingStockChanges[id];
                        showToast('Producto eliminado (DB)');
                        renderProducts();
                        return;
                    }
                }catch(e){ /* fallback to local */ }
            }

            let prods = loadProducts();
            prods = prods.filter(p=>p.id!==id);
            saveProducts(prods);
            if (pendingStockChanges[id] !== undefined) delete pendingStockChanges[id];
            showToast('Producto eliminado');
            renderProducts();
        }

        // --- Edit product (inline) ---
        function openEdit(id){
            const prods = serverProducts || loadProducts();
            const p = prods.find(x=>x.id===id);
            if (!p) return showToast('Producto no encontrado');
            editingProductId = id;
            editingDrafts[id] = Object.assign({}, p);
            renderProducts();
            // populate category select after render
            setTimeout(()=>{
                const sel = document.getElementById('edit-eyebrow-' + id);
                if (!sel) return;
                sel.innerHTML = '';
                const placeholder = document.createElement('option'); placeholder.value = ''; placeholder.textContent = 'Seleccionar...'; sel.appendChild(placeholder);
                let found = false;
                (window.DJ_CATEGORIES || []).forEach(cat => { const o = document.createElement('option'); o.value = cat; o.textContent = cat; if ((p.eyebrow||'') === cat){ o.selected = true; found = true; } sel.appendChild(o); });
                const other = document.createElement('option'); other.value = '__other'; other.textContent = 'Otro (especificar)'; sel.appendChild(other);
                if (!found && p.eyebrow){ const opt = document.createElement('option'); opt.value = p.eyebrow; opt.textContent = p.eyebrow; opt.selected = true; sel.appendChild(opt); }
            }, 40);
        }

        function cancelEdit(id){
            if (editingProductId === id){ editingProductId = null; }
            try{ delete editingDrafts[id]; }catch(e){}
            renderProducts();
        }

        async function saveEditedProduct(id){
            const titleEl = document.getElementById('edit-title-' + id);
            if (!titleEl) return showToast('Formulario no encontrado');
            const updated = {
                eyebrow: (document.getElementById('edit-eyebrow-' + id)?.value || '').trim(),
                title: (document.getElementById('edit-title-' + id)?.value || '').trim(),
                price: parseInt((document.getElementById('edit-price-' + id)?.value || '0').toString().replace(/\D/g,''), 10) || 0,
                stock: parseInt((document.getElementById('edit-stock-' + id)?.value || '0'), 10) || 0,
                image: (document.getElementById('edit-image-' + id)?.value || '').trim(),
                description: (document.getElementById('edit-description-' + id)?.value || '').trim()
            };
            if (!updated.title) return showToast('Título requerido', 1200);

            // Try Firestore update first
            try{
                const fbOk = await (window.waitForFirestore ? window.waitForFirestore(4000) : Promise.resolve(false));
                if (fbOk && window.__FIRESTORE_DB__){
                    try{
                        await window.__FIRESTORE_DB__.collection('products').doc(id).update(updated);
                        // refresh list
                        try{ const snap = await window.__FIRESTORE_DB__.collection('products').get(); serverProducts = snap.docs.map(d => ({ id: d.id, ...d.data() })); }catch(e){}
                        editingProductId = null; delete editingDrafts[id]; showToast('Producto actualizado (Firestore)', 1400); renderProducts(); return;
                    }catch(e){ console.error('Firestore update failed', e); }
                }
            }catch(e){ console.warn('waitForFirestore failed', e); }

            // Try API
            try{
                const res = await apiFetch('/products/' + encodeURIComponent(id), { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updated) });
                if (res && res.ok){ const prod = await res.json(); serverProducts = (serverProducts||[]).map(p => p.id === id ? prod : p); editingProductId = null; delete editingDrafts[id]; showToast('Producto actualizado (DB)', 1400); renderProducts(); return; }
            }catch(e){ console.error('API update failed', e); }

            // Fallback: local update
            try{
                const prods = loadProducts() || [];
                const idx = prods.findIndex(p=>p.id===id);
                if (idx !== -1){ prods[idx] = Object.assign({}, prods[idx], updated, { id }); saveProducts(prods); serverProducts = prods; editingProductId = null; delete editingDrafts[id]; showToast('Producto actualizado localmente', 1200); renderProducts(); return; }
            }catch(e){ console.error('Local update failed', e); }

            showToast('No fue posible actualizar el producto', 1600);
        }

        document.addEventListener('DOMContentLoaded', async ()=>{
            // Prefer Firestore (if configured), then API, then repo db.json
            try{
                const fbOk = await (window.waitForFirestore ? window.waitForFirestore(4000) : Promise.resolve(false));
                if (fbOk && window.__FIRESTORE_DB__){
                    try{
                        const snap = await window.__FIRESTORE_DB__.collection('products').get();
                        serverProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    }catch(e){ serverProducts = null; }
                }
            }catch(e){ /* ignore */ }

            if (!serverProducts || !serverProducts.length){
                try{
                    const res = await apiFetch('/products');
                    if (res && res.ok){ serverProducts = await res.json(); useApi = true; }
                }catch(e){ useApi = false; serverProducts = null; }
            }

            if (!serverProducts || !serverProducts.length){
                // try repo db.json
                const repoBase = document.querySelector('meta[name="repo-base"]')?.content || window.__REPO_BASE__ || '';
                const candidates = [];
                if (repoBase) candidates.push(repoBase.replace(/\/$/, '') + '/db.json');
                candidates.push('/db.json');
                for (const url of candidates){
                    try{
                        const r = await fetch(url, { cache: 'no-cache' });
                        if (r && r.ok){
                            const data = await r.json();
                            serverProducts = Array.isArray(data) ? data : (data.products || []);
                            break;
                        }
                    }catch(err){ /* try next */ }
                }
            }

            renderProducts();

            const commitBtn = document.getElementById('commit-stock-btn');
            if (commitBtn){
                commitBtn.addEventListener('click', commitStockChanges);
                updateCommitButtonState();
            }
        });
    </script>
</body>
</html>
