<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ofertas - D&J Beauty Studio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="https://i.imgur.com/Kz8qfG3.png" type="image/png">
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://i.imgur.com/Kz8qfG3.png" alt="Logo D&J Beauty Studio" style="width: 150px;">
        </div>
    </header>

    <nav>
        <a href="index.html">Sobre Nosotros</a>
        <a href="productos.html">Productos</a>
        <a href="ofertas.html">Ofertas</a>
        <a href="envios.html">Envíos Nacionales</a>
        <a href="staff.html">Staff</a>
    </nav>

    <div class="container">
        <h2>Ofertas del Mes</h2>

        <div class="offer-banner">
            <h3 style="font-size: 2rem; margin: 0;">¡2x1 en Labiales!</h3>
            <p>Solo por este fin de semana, lleva dos labiales de la colección Cherry y paga uno.</p>
        </div>

        <div class="grid-container">
             <div class="card">
                <div style="position: absolute; background: #810319; color: white; padding: 5px 10px; font-size: 0.8rem;">-20% OFF</div>
                <img src="https://placehold.co/300x250/810319/ffffff?text=Combo+SkinCare" class="card-img-top" alt="Combo">
                <div class="card-body">
                    <h3>Combo SkinCare Total</h3>
                    <p style="text-decoration: line-through; color: #999;">$60.00</p>
                    <p class="price">$48.00</p>
                    <button class="btn btn-buy">Aprovechar Oferta</button>
                </div>
            </div>
            
            <div class="card">
                 <div style="position: absolute; background: #810319; color: white; padding: 5px 10px; font-size: 0.8rem;">LIQUIDACIÓN</div>
                <img src="https://placehold.co/300x250/810319/ffffff?text=Esmaltes" class="card-img-top" alt="Esmaltes">
                <div class="card-body">
                    <h3>Set Esmaltes Gel</h3>
                    <p style="text-decoration: line-through; color: #999;">$25.00</p>
                    <p class="price">$15.00</p>
                    <button class="btn btn-buy">Aprovechar Oferta</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2023 D&J Beauty Studio.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
